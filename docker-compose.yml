services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sdwan
      POSTGRES_USER: sdwan
      POSTGRES_PASSWORD: sdwan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdwan -d sdwan"]
      interval: 5s
      timeout: 3s
      retries: 20

  controller:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://sdwan:sdwan@postgres:5432/sdwan?sslmode=disable
      CONTROLLER_URL: https://controller.englishlisten.cn
      LISTEN_ADDR: :8080
      DEFAULT_MAX_DEVICES: "254"
      POLL_INTERVAL_SECONDS: "15"
      MIN_SUPPORTED_CLIENT_VERSION: v1.1.9
      LATEST_CLIENT_VERSION: v1.1.9
      BOOTSTRAP_WG_PUBLIC_KEY: ${BOOTSTRAP_WG_PUBLIC_KEY:-}
      BOOTSTRAP_WG_ENDPOINT: ${BOOTSTRAP_WG_ENDPOINT:-}
      BOOTSTRAP_WG_ALLOWED_IP: ${BOOTSTRAP_WG_ALLOWED_IP:-100.254.254.254/32}
      BOOTSTRAP_REPORT_TOKEN: ${BOOTSTRAP_REPORT_TOKEN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-SD-WAN 謗ｧ蛻ｶ蜿?<noreply@mail.englishlisten.cn>}
      EMAIL_CODE_TTL_SECONDS: ${EMAIL_CODE_TTL_SECONDS:-600}
      EMAIL_CODE_COOLDOWN_SECONDS: ${EMAIL_CODE_COOLDOWN_SECONDS:-60}
      EMAIL_CODE_MAX_ATTEMPTS: ${EMAIL_CODE_MAX_ATTEMPTS:-5}
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    ports:
      - "8081:80"
    depends_on:
      - controller

volumes:
  postgres_data:
